<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      padding: 16px;
      font-family: Segoe UI, sans-serif;
      background: #0f0f1a;
      color: #ffffff;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 4px;
      color: #ffffff;
    }
    p {
      color: #888;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #1a1a2e;
      margin-bottom: 12px;
      font-size: 13px;
      border: 1px solid #2a2a3e;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a2e;
      color: #fff;
      font-size: 13px;
      margin-bottom: 8px;
      display: block;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #result {
      border-radius: 8px;
      padding: 12px;
      margin-top: 8px;
      display: none;
    }
    .safe  { background: #001a0a; border: 1px solid #00cc66; }
    .phish { background: #1a0000; border: 1px solid #ff4444; }
    .verdict {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .prob { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <h2>🛡️ Phishing Detector</h2>
  <p>Protecting your browsing automatically</p>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Checking API...</span>
  </div>

  <input
    type="text"
    id="url-input"
    placeholder="https://example.com"
  />

  <button id="check-btn">Check URL</button>

  <div id="result">
    <div class="verdict" id="verdict"></div>
    <div class="prob" id="prob"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
